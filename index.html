<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@trendsetter | Bio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="bg.mp4" type="video/mp4">
    </video>
    
    <div class="video-overlay"></div>

    <canvas id="particles"></canvas>

    <div id="enter-screen">
        <span>Кликни, если мать шлюха.</span>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="bio-card" id="bio-card">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Avatar" class="avatar">
        </div>
        <h1 class="nickname">trendsetter</h1>
        <p class="description">когда я выросту, я трахну лесбиянку</p>

        <div class="discord-widget">
            <div class="discord-avatar-container">
                <img src="" alt="Discord" id="dc-avatar" class="dc-avatar">
                <div class="discord-status" id="dc-status"></div>
            </div>
            <div class="discord-info">
                <div class="dc-name" id="dc-name">Загрузка...</div>
                <div class="dc-activity" id="dc-activity">Подключение к Discord</div>
            </div>
        </div>

        <div class="audio-controls">
            <canvas id="visualizer"></canvas>
            <div class="volume-container">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/твой_github" target="_blank"><span class="link-text">GitHub</span></a>
            <a href="https://vk.com/твой_vk" target="_blank"><span class="link-text">VK</span></a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
